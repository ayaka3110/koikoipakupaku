<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>癒やしの餌やり池ゲーム - 完全分散版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let fishes;
        let foods;
        let waterLine;

        function preload() {
            this.load.image('pond', 'pond.jpg');
            this.load.image('koi', 'koi.png');
        }

        function create() {
            const w = this.cameras.main.width;
            const h = this.cameras.main.height;
            waterLine = h * 0.55;

            this.add.image(w / 2, h / 2, 'pond').setDisplaySize(w, h);

            fishes = this.physics.add.group();
            foods = this.physics.add.group();

            for (let i = 0; i < 15; i++) {
                let x = Phaser.Math.Between(50, w - 50);
                let y = Phaser.Math.Between(waterLine + 50, h - 50);
                let fish = fishes.create(x, y, 'koi');
                fish.setBlendMode(Phaser.BlendModes.SCREEN);
                fish.setDisplaySize(100, 50);
                fish.body.setBoundsRectangle(new Phaser.Geom.Rectangle(0, waterLine, w, h - waterLine));
                fish.body.setCollideWorldBounds(true);
                fish.targetFood = null;
            }

            // 衝突判定：食べた瞬間の処理
            this.physics.add.overlap(fishes, foods, (fish, food) => {
                food.destroy();
                // この餌を狙っていた全鯉のターゲットを解除
                fishes.getChildren().forEach(f => {
                    if (f.targetFood === food) {
                        f.targetFood = null;
                        f.body.setVelocity(0, 0);
                    }
                });
            });

            this.input.on('pointerdown', (pointer) => {
                if (pointer.y < waterLine) return;
                let food = this.add.circle(pointer.x, pointer.y, 12, 0xffffcc); // 12pxに拡大
                food.setStrokeStyle(3, 0xffa500);
                foods.add(food);
            });
        }

        function update() {
            // 餌ごとに「現在何匹に狙われているか」をカウント
            let foodClaims = new Map();
            foods.getChildren().forEach(f => foodClaims.set(f, 0));
            fishes.getChildren().forEach(f => {
                if (f.targetFood && f.targetFood.active) {
                    foodClaims.set(f.targetFood, foodClaims.get(f.targetFood) + 1);
                }
            });

            fishes.children.iterate(fish => {
                // 1. ターゲット消失チェック
                if (fish.targetFood && !fish.targetFood.active) {
                    fish.targetFood = null;
                }

                // 2. 強制分散ロジック
                // 「今の餌に3匹以上群がっている」または「ターゲットがない」場合、新しい餌を探す
                let currentClaim = fish.targetFood ? foodClaims.get(fish.targetFood) : 0;
                
                if (!fish.targetFood || currentClaim > 2) {
                    // まだ2匹未満しか狙っていない餌をリストアップ
                    let availableFoods = foods.getChildren().filter(f => f.active && foodClaims.get(f) < 2);
                    
                    if (availableFoods.length > 0) {
                        // 新しいターゲットを設定
                        let oldTarget = fish.targetFood;
                        fish.targetFood = Phaser.Utils.Array.GetRandom(availableFoods);
                        
                        // カウントの更新
                        if (oldTarget) foodClaims.set(oldTarget, foodClaims.get(oldTarget) - 1);
                        foodClaims.set(fish.targetFood, foodClaims.get(fish.targetFood) + 1);
                    } else if (currentClaim > 2) {
                        // 他に空きがなく、今の餌も混んでいるなら、ターゲットを捨てて自由遊泳へ
                        fish.targetFood = null;
                        foodClaims.set(oldTarget, foodClaims.get(oldTarget) - 1);
                    }
                }

                // 3. 移動実行
                if (fish.targetFood && fish.targetFood.active) {
                    this.physics.moveToObject(fish, fish.targetFood, 160); // 速度を少し上げました
                    let angle = Phaser.Math.Angle.Between(fish.x, fish.y, fish.targetFood.x, fish.targetFood.y);
                    fish.rotation = angle;
                    fish.flipY = (Math.abs(angle) > Math.PI / 2);
                } else {
                    // 自由遊泳
                    if (Phaser.Math.Between(0, 100) > 98) {
                        let vx = Phaser.Math.Between(-50, 50);
                        let vy = Phaser.Math.Between(-50, 50);
                        if (fish.y < waterLine + 30) vy = Math.abs(vy);
                        fish.body.setVelocity(vx, vy);
                        let angle = Phaser.Math.Angle.Between(0, 0, vx, vy);
                        fish.rotation = angle;
                        fish.flipY = (Math.abs(angle) > Math.PI / 2);
                    }
                }
            });
        }
    </script>
</body>
</html>
